<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVAFORGE | Submit Innovation</title>
</head>
<body style="background-color: #0d1117; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; padding: 30px 15px; margin: 0; text-align: center;">

    <!-- Top Navigation Link -->
    <div style="text-align: left; margin-bottom: 20px;">
        <a href="index.html" style="color: #58a6ff; text-decoration: none; font-weight: bold; font-size: 1rem;">← Home Base</a>
    </div>

    <h1 style="color: #ff7b72; font-size: 2.5rem; font-weight: 800; margin-bottom: 10px;">💡 Submit Your Innovation</h1>
    <p style="font-size: 1.1rem; color: #8b949e; max-width: 500px; margin: 0 auto 30px auto;">
        Share your groundbreaking concepts. Approved ideas earn an official certificate and elite leaderboard entry.
    </p>

    <!-- Submission Form -->
    <!-- Note: Replace 'your_formspree_id' with your actual Formspree ID later to get emails! -->
    <form action="https://formspree.io" method="POST" style="background-color: #161b22; border: 1px solid #30363d; padding: 30px 20px; border-radius: 12px; max-width: 400px; margin: 0 auto; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        
        <!-- Input 1: Full Name -->
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; color: #c9d1d9; margin-bottom: 8px;">Your Name:</label>
            <input type="text" name="visitor_name" required style="width: 100%; box-sizing: border-box; background-color: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 6px; color: white; font-size: 1rem;">
        </div>

        <!-- Input 2: Idea Name -->
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; color: #c9d1d9; margin-bottom: 8px;">Idea Name:</label>
            <input type="text" name="idea_title" required style="width: 100%; box-sizing: border-box; background-color: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 6px; color: white; font-size: 1rem;">
        </div>

        <!-- Input 3: Category Selector -->
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; color: #c9d1d9; margin-bottom: 8px;">Category:</label>
            <select name="idea_category" required style="width: 100%; box-sizing: border-box; background-color: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 6px; color: white; font-size: 1rem; cursor: pointer;">
                <option value="Science">🔬 Science</option>
                <option value="Technology">💻 Technology</option>
                <option value="Business">💼 Business</option>
            </select>
        </div>

        <!-- Input 4: Idea Description -->
        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; color: #c9d1d9; margin-bottom: 8px;">Describe Your Idea:</label>
            <textarea name="idea_description" rows="5" required style="width: 100%; box-sizing: border-box; background-color: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 6px; color: white; font-size: 1rem; resize: vertical;"></textarea>
        </div>

        <!-- Submit Button -->
        <button type="submit" style="width: 100%; background-color: #238636; color: white; border: none; padding: 14px; font-size: 1.1rem; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;">
            🚀 Submit Concept
        </button>

    </form>

</body>
</html>
